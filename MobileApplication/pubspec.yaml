# 文件作用：声明Flutter 项目的名称、版本、依赖和 Flutter 配置。

name: milo_ai
description: Flutter and Dart version of the Mota companion robot app.
publish_to: "none"
version: 2.0.0+2

environment:
    sdk: ">=3.4.0 <4.0.0"

dependencies:
    flutter:
        sdk: flutter
    image_picker: ^1.1.2
    flutter_blue_plus: ^2.0.0
    permission_handler: ^12.0.0
    path_provider: ^2.1.5
    record: ^6.1.2
    sherpa_onnx: ^1.13.3
    shared_preferences: ^2.5.5
    flutter_secure_storage: ^9.2.4
    flutter_svg: ^2.0.17
    url_launcher: ^6.3.1
    web_socket_channel: ^3.0.1

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^5.0.0

flutter:
    uses-material-design: true
    assets:
        - assets/asr_models/
        - assets/icons/
    fonts:
        - family: HarmonyOS Sans
          fonts:
              - asset: assets/fonts/HarmonyOS_Sans_SC_Regular.ttf
                weight: 400
              - asset: assets/fonts/HarmonyOS_Sans_SC_Medium.ttf
                weight: 500
              - asset: assets/fonts/HarmonyOS_Sans_SC_Bold.ttf
                weight: 700
